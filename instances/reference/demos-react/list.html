<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GeneticPrism List React Demo</title>
  <link rel="stylesheet" href="../../../src/components/list/list.css">
  <link rel="stylesheet" href="./react-demo.css">
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.3.1",
        "react-dom/client": "https://esm.sh/react-dom@18.3.1/client"
      }
    }
  </script>
</head>
<body>
  <div id="react-root"></div>
  <script type="module">
    import React, {useCallback, useEffect, useState} from "react";
    import {createRoot} from "react-dom/client";
    import {ReactList} from "../../../src/components/list/List.react.js";
    import {loadReferenceDemoModels} from "../demo-support/reference-data.js";

    const e = React.createElement;

    function toDetail(item = {}) {
      const raw = item.raw || item;
      return {
        id: raw.id,
        name: raw.label || raw.name,
        subtitle: raw.subtitle,
        slice: raw.primarySliceId,
        time: raw.time,
        source: raw.meta?.source,
        contributors: raw.meta?.contributors,
        metrics: {
          impact: raw.impact,
          importance: raw.importance,
          referenceCount: raw.meta?.referenceCount,
        },
        description: raw.description,
      };
    }

    function ListReactDemo() {
      const [model, setModel] = useState(null);
      const [detail, setDetail] = useState({hint: "点击列表项查看详情"});

      useEffect(() => {
        let cancelled = false;
        loadReferenceDemoModels({list: {limit: 80}}).then(nextModel => {
          if (cancelled) return;
          setModel(nextModel);
          setDetail(toDetail(nextModel.list.items[0]?.raw));
        }).catch(error => setDetail({error: error.message}));
        return () => {
          cancelled = true;
        };
      }, []);

      const handleClick = useCallback(item => {
        setDetail(toDetail(item));
      }, []);

      return e("div", {className: "demo-shell"},
        e("header", {className: "demo-header"},
          e("span", null, "List Component Demo · React"),
          e("span", null, "React call")
        ),
        e("main", {className: "demo-main"},
          e("section", {className: "component-card"},
            e("div", {className: "panel-title"}, "List"),
            model
              ? e(ReactList, {
                data: model.list,
                options: {mode: "list", titleField: "label", valueField: "impact", numberPrecision: 2},
                onItemClick: handleClick,
                className: "component-host",
              })
              : e("div", {className: "loading schema-body"}, "Loading reference data...")
          ),
          e("section", {className: "schema-card detail-card"},
            e("div", {className: "detail-header"}, e("h2", null, "Node Detail")),
            e("div", {className: "detail-body"}, e(ReactList, {
              data: detail,
              options: {mode: "json", numberPrecision: 4},
            }))
          )
        )
      );
    }

    createRoot(document.querySelector("#react-root")).render(e(ListReactDemo));
  </script>
</body>
</html>
